# Device
CONFIG_USB_DEVICE_MANUFACTURER="Steroid Gandalf, Office Hobbit, Patattack"
CONFIG_USB_DEVICE_PRODUCT="Delta Omega"

# LED Indicator
CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_SHOW_LAYER_CHANGE=n

# BLE stability (disables 2M PHY, recommended for split nRF52840)
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Power
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_PM_SOFT_OFF=y

# Debounce — tuned for Kailh PG1316S (SMD low-profile, gold contacts,
# clean bounce + short 1.8mm travel). Eager press, snappy release.
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=2
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# ZMK Studio (runtime keymap editing)
CONFIG_ZMK_STUDIO=y

# Pointing / Mouse keys
CONFIG_ZMK_POINTING=y
