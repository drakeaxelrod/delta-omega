<svg width="911" height="400" viewBox="0 0 911 400" class="keymap" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="keyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f2f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="keyGradientCombo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cfe7ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="keyGradientHeld" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe5e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd0d0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <style>
    svg.keymap {
      font-family: 'Lilex Nerd Font', 'LilexNerdFont', SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace;
      font-size: 14px;
      font-kerning: normal;
      text-rendering: optimizeLegibility;
      fill: #1f2937;
    }

    rect.key {
      fill: url(#keyGradient);
      filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.15));
      stroke: #c5cbd3;
      stroke-width: 2;
    }

    rect.held {
      fill: url(#keyGradientHeld);
    }

    rect.combo {
      fill: url(#keyGradientCombo);
      stroke: #8bb5e8;
      stroke-width: 2;
    }

    text {
      text-anchor: middle;
      dominant-baseline: middle;
    }

    text.tap {
      font-size: 14px;
      font-weight: 700;
    }

    text.hold {
      font-size: 11px;
      font-weight: 700;
      opacity: 0.95;
      text-anchor: middle;
      dominant-baseline: auto;
      transform: translateY(18px);
    }

    text.hold.small {
      font-size: 9px;
    }

    text.trans {
      fill: #9ca3af;
    }

    text.label {
      font-weight: bold;
      text-anchor: start;
      stroke: white;
      stroke-width: 4;
      paint-order: stroke;
    }

    text.combo {
      font-size: 11px;
      font-weight: 700;
    }

    path.combo {
      stroke-width: 1;
      stroke: #9ca3af;
      fill: none;
    }
  </style>
