---
include:
  # ── Gallium (default layout) ──
  - board: xiao_ble//zmk
    shield: delta_omega_left
    snippet: studio-rpc-usb-uart zmk-usb-logging
    cmake-args: -DKEYMAP_FILE="${GITHUB_WORKSPACE}/config/delta_omega.keymap"
    artifact-name: delta-omega-gallium-left
  - board: xiao_ble//zmk
    shield: delta_omega_right
    snippet: studio-rpc-usb-uart zmk-usb-logging
    cmake-args: -DKEYMAP_FILE="${GITHUB_WORKSPACE}/config/delta_omega.keymap"
    artifact-name: delta-omega-gallium-right
  # ── QWERTY layout ──
  - board: xiao_ble//zmk
    shield: delta_omega_left
    snippet: studio-rpc-usb-uart zmk-usb-logging
    cmake-args: -DKEYMAP_FILE="${GITHUB_WORKSPACE}/config/delta_omega_qwerty.keymap"
    artifact-name: delta-omega-qwerty-left
  - board: xiao_ble//zmk
    shield: delta_omega_right
    snippet: studio-rpc-usb-uart zmk-usb-logging
    cmake-args: -DKEYMAP_FILE="${GITHUB_WORKSPACE}/config/delta_omega_qwerty.keymap"
    artifact-name: delta-omega-qwerty-right
  # ── Settings reset (layout-independent) ──
  - board: xiao_ble//zmk
    shield: settings_reset
    artifact-name: delta-omega-settings-reset
